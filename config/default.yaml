board:
  rows: 15
  cols: 15
  cell_size_mm: 22.0
  calibration:
    method: manual
    corners:
      top_left:
      - 460
      - 125
      top_right:
      - 958
      - 119
      bottom_right:
      - 1132
      - 595
      bottom_left:
      - 362
      - 603
    dst_size: 600
camera:
  device_index: 4
  width: 1280
  height: 720
  fps: 30
  warmup_frames: 5
board_detection:
  method: manual
  canny_low: 50
  canny_high: 150
  hough_threshold: 100
  min_line_length: 200
  max_line_gap: 50
stone_detection:
  hough_dp: 1.0
  hough_min_dist: 25
  hough_param1: 40.0
  hough_param2: 15.0
  hough_min_radius: 10
  hough_max_radius: 22
  white_inner_mean: 75.0
  white_contrast: 10.0
robot:
  port: /dev/ttyACM0
  baudrate: 115200
  id: so101_follower_0610
  z_height: 50.0
  calibrate_before_game: true
  coordinate_space: lerobot_action
  pose_map:
    method: measured
    path: so101_board_81_positions.json
  # Legacy fallback used when robot.pickup_poses.<black|white> is not set.
  pickup_pose: null
  # Fill these with the two stone-supply pickup poses after recording them.
  pickup_poses:
    black: null
    white: null
  waiting_pose: waiting
  air_pump:
    enabled: false
    dry_run: false
    valve_pin: 20
    pump_pin: 21
    min_pulse_us: 544
    max_pulse_us: 2400
    frame_ms: 20
    pick_seconds: 1.0
    drop_delay_seconds: 0.05
    verbose: true
  calibration_points: []
  calibration:
    method: manual
    coordinate_space: lerobot_action
    corners: {}
game:
  robot_stone: black
  # Deprecated compatibility alias for older code paths.
  my_stone: black
  # The camera still recognises the full 15x15 intersections, but real robot
  # play is limited to the centered 9x9 window covered by the 81-position map.
  play_area:
    rows: 9
    cols: 9
    row_offset: 3
    col_offset: 3
  ai_level: basic
  ai:
    # null = auto-select bin/rapfi/<platform>/rapfi.
    engine_path: null
    # null = derive from game.play_area; centered 9x9 starts Rapfi as a 9x9 game.
    board_size: null
    time_per_move_ms: 3000
interaction:
  human_done:
    mode: keyboard
    confirm_keys:
    - enter
    - space
    speak_key: s
    dance_key: d
    skill_gomoku_key: g
    quit_key: q
